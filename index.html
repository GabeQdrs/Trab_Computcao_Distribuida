<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocShare - Compartilhamento de Documentos em Tempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0e639c;
            --primary-light: #1177bb;
            --primary-dark: #08507a;
            --bg-dark: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border: #333333;
            --success: #4ec9b0;
            --error: #f48771;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ===== LANDING PAGE ===== */
        #landing-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            overflow: hidden;
            position: relative;
        }

        #landing-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 99, 156, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        #landing-page::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(78, 201, 176, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .landing-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .landing-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0e639c 0%, #4ec9b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .landing-content p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
            text-align: left;
        }

        .feature {
            padding: 1rem;
            background-color: rgba(14, 99, 156, 0.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            background-color: rgba(14, 99, 156, 0.15);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .feature h3 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            color: var(--primary-light);
        }

        .feature p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .nickname-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        #landing-nickname {
            flex: 1;
            padding: 0.95rem 1.2rem;
            background-color: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #ws-port {
            width: 120px;
            padding: 0.95rem 1.2rem;
            background-color: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #ws-port:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--bg-tertiary);
        }

        #landing-nickname:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--bg-tertiary);
        }

        #landing-nickname::placeholder {
            color: var(--text-secondary);
        }

        .btn-primary {
            padding: 0.95rem 2rem;
            background: linear-gradient(135deg, #0e639c 0%, #1177bb 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(14, 99, 156, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 99, 156, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ===== EDITOR INTERFACE ===== */
        #main-container {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #main-container.active {
            display: flex;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .header-info {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.9rem;
        }

        .info-badge {
            background-color: rgba(14, 99, 156, 0.15);
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .info-badge:hover {
            background-color: rgba(14, 99, 156, 0.25);
        }

        .content-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .new-file-btn {
            background-color: var(--primary);
            border: none;
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .new-file-btn:hover {
            background-color: var(--primary-light);
            transform: scale(1.1);
        }

        .files-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .file-item {
            padding: 0.75rem 0.85rem;
            margin-bottom: 0.5rem;
            background-color: var(--bg-tertiary);
            border-left: 3px solid transparent;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            group: file-item;
        }

        .file-item:hover {
            background-color: rgba(14, 99, 156, 0.1);
            transform: translateX(5px);
        }

        .file-item.active {
            border-left-color: var(--primary);
            background-color: rgba(14, 99, 156, 0.15);
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .file-item.renaming .file-name {
            display: none;
        }

        .file-input {
            flex: 1;
            padding: 0.3rem 0.5rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .file-actions {
            display: flex;
            gap: 0.3rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .file-item:hover .file-actions {
            opacity: 1;
        }

        .file-action-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-action-btn:hover {
            background-color: rgba(14, 99, 156, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }

        .file-action-btn.delete:hover {
            background-color: rgba(244, 135, 113, 0.2);
            border-color: var(--error);
            color: var(--error);
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor {
            flex: 1;
            width: 100%;
            padding: 1.5rem;
            border: none;
            outline: none;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            font-family: 'Fira Code', 'Courier New', monospace;
            transition: background-color 0.3s ease;
        }

        #editor:focus {
            background-color: rgba(14, 99, 156, 0.05);
        }

        #editor::placeholder {
            color: var(--text-secondary);
        }

        footer {
            background-color: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-message {
            padding: 0.5rem 1rem;
            background-color: rgba(78, 201, 176, 0.1);
            border-left: 3px solid var(--success);
            border-radius: 4px;
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }

            .landing-content h1 {
                font-size: 2.5rem;
            }

            .header-info {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page">
        <div class="landing-content">
            <div class="logo">📝</div>
            <h1>DocShare</h1>
            <div class="nickname-form">
                <input type="text" id="landing-nickname" placeholder="Digite seu apelido..." maxlength="20">
                <input type="number" id="ws-port" placeholder="Porta WebSocket (8080)" value="8080" min="1000" max="9999">
                <button class="btn-primary" onclick="enterEditor()">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Editor Interface -->
    <div id="main-container">
        <header>
            <div class="header-content">
                <h1>📝 DocShare</h1>
                <div class="header-info">
                    <div class="info-badge">
                        👤 <span id="my-nickname">Carregando...</span>
                    </div>
                    <div class="info-badge">
                        👥 <span id="clients-count">1</span> cliente(s)
                    </div>
                    <div class="info-badge">
                        🔌 <span id="current-port-display">Porta: 8080</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>📁 Arquivos</h3>
                    <button class="new-file-btn" onclick="createNewFile()" title="Novo arquivo">+</button>
                </div>
                <div class="files-list" id="files-list"></div>
            </div>

            <div class="editor-container">
                <textarea id="editor" placeholder="Selecione um arquivo para começar..."></textarea>
            </div>
        </div>

        <footer>
            <div class="status-message" id="status-message">Conectado ✓</div>
            <div>DocShare v1.0 | Compartilhamento em Tempo Real</div>
        </footer>
    </div>

    <script>
        const landingPage = document.getElementById('landing-page');
        const mainContainer = document.getElementById('main-container');
        const editor = document.getElementById('editor');
        const filesList = document.getElementById('files-list');
        const statusMessage = document.getElementById('status-message');
        
        let ws;
        let myNickname = null;
        let currentFile = 'Document1';
        let localFiles = ['Document1'];
        let isUpdatingFromServer = false;
        let renamingFile = null;
        let currentPort = 8080;
        let isConnecting = false;

        function enterEditor() {
            const input = document.getElementById('landing-nickname');
            const portInput = document.getElementById('ws-port');
            const nickname = input.value.trim();
            
            if (!nickname) {
                alert('Digite um apelido válido!');
                return;
            }
            
            myNickname = nickname;
            currentPort = parseInt(portInput.value) || 8080;
            isConnecting = true;
            connectWebSocket(currentPort);
        }

        function connectWebSocket(port) {
            if (!isConnecting) return;
            
            console.log(`🔄 Tentando conectar na porta ${port}...`);
            updatePortDisplay(port);
            
            ws = new WebSocket(`ws://localhost:${port}`);
            let connectionTimeout = setTimeout(() => {
                if (ws.readyState === WebSocket.CONNECTING) {
                    console.log(`❌ Timeout na porta ${port}, tentando próxima...`);
                    ws.close();
                    connectWebSocket(port + 1);
                }
            }, 2000);

            ws.onopen = function(event) {
                clearTimeout(connectionTimeout);
                console.log(`✅ Conexão WebSocket aberta na porta ${port}.`);
                currentPort = port;
                updatePortDisplay(port);
                ws.send(JSON.stringify({
                    action: 'set_nickname',
                    nickname: myNickname
                }));
                updateStatus('Conectado ✓');
                isConnecting = false;
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'error') {
                        alert(data.message);
                        return;
                    }
                    
                    if (data.type === 'nickname_taken') {
                        alert(`${data.message}\n\n🔄 Tentando conectar em outra porta...`);
                        // Tentar próxima porta automaticamente
                        if (ws) {
                            ws.close();
                        }
                        setTimeout(() => connectWebSocket(currentPort + 1), 1000);
                        return;
                    }
                    
                    if (data.type === 'files_list') {
                        // Se recebeu a lista de arquivos, significa que o nickname foi aceito
                        landingPage.style.display = 'none';
                        mainContainer.classList.add('active');
                        document.getElementById('my-nickname').textContent = myNickname;
                        
                        localFiles = data.files;
                        renderFilesList();
                        if (localFiles.length > 0) {
                            selectFile(localFiles[0]);
                        }
                    }
                    
                    else if (data.type === 'file_content') {
                        if (data.filename === currentFile && data.content !== editor.value) {
                            isUpdatingFromServer = true;
                            const cursorPos = editor.selectionStart;
                            editor.value = data.content;
                            editor.selectionStart = editor.selectionEnd = Math.min(cursorPos, editor.value.length);
                            isUpdatingFromServer = false;
                        }
                        if (data.edited_by && data.edited_by !== myNickname) {
                            updateStatus(`✏️ ${data.edited_by} está editando...`);
                        }
                    }
                    
                    else if (data.type === 'file_created') {
                        localFiles.push(data.filename);
                        renderFilesList();
                        updateStatus(`📄 ${data.created_by} criou: ${data.filename}`);
                    }
                    
                    else if (data.type === 'file_deleted') {
                        localFiles = localFiles.filter(f => f !== data.filename);
                        renderFilesList();
                        if (currentFile === data.filename) {
                            selectFile(localFiles[0] || 'Document1');
                        }
                        updateStatus(`🗑️ ${data.deleted_by} deletou: ${data.filename}`);
                    }
                    
                    else if (data.type === 'file_cloned') {
                        localFiles.push(data.clone);
                        renderFilesList();
                        updateStatus(`📋 ${data.cloned_by} clonou: ${data.original}`);
                    }
                    
                    else if (data.type === 'file_renamed') {
                        localFiles = localFiles.map(f => f === data.old_filename ? data.new_filename : f);
                        if (currentFile === data.old_filename) {
                            currentFile = data.new_filename;
                        }
                        renderFilesList();
                        updateStatus(`✏️ ${data.renamed_by} renomeou para: ${data.new_filename}`);
                    }
                    
                    else if (data.type === 'client_joined') {
                        document.getElementById('clients-count').textContent = data.total_clients;
                        if (data.nickname !== myNickname) {
                            updateStatus(`✅ ${data.nickname} entrou`);
                        }
                    }
                    
                    else if (data.type === 'client_left') {
                        document.getElementById('clients-count').textContent = data.total_clients;
                        updateStatus(`❌ ${data.nickname} saiu`);
                    }
                    
                } catch (e) {
                    console.error('Erro ao processar mensagem:', e);
                }
            };

            ws.onclose = function(event) {
                console.log('❌ Conexão WebSocket fechada.');
                updateStatus('Desconectado ✗ Tentando reconectar...');
                setTimeout(() => connectWebSocket(currentPort), 3000);
            };

            ws.onerror = function(error) {
                console.error('⚠️ Erro na conexão WebSocket:', error);
                if (isConnecting) {
                    console.log(`❌ Erro na porta ${port}, tentando próxima...`);
                    setTimeout(() => connectWebSocket(port + 1), 1000);
                } else {
                    updateStatus('Erro na conexão');
                }
            };
        }

        function updatePortDisplay(port) {
            const portDisplay = document.getElementById('current-port-display');
            if (portDisplay) {
                portDisplay.textContent = `Porta: ${port}`;
            }
        }

        function selectFile(filename) {
            currentFile = filename;
            editor.value = '';
            editor.placeholder = `Carregando ${filename}...`;
            renderFilesList();
            
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'text_update',
                    filename: filename,
                    content: ''
                }));
            }
        }

        function createNewFile() {
            const name = prompt('Nome do novo arquivo:');
            if (name && name.trim()) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'create_file',
                        filename: name.trim()
                    }));
                }
            }
        }

        function deleteFile(filename) {
            if (confirm(`Deletar "${filename}"?`)) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'delete_file',
                        filename: filename
                    }));
                }
            }
        }

        function cloneFile(filename) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'clone_file',
                    filename: filename
                }));
            }
        }

        function startRename(filename, event) {
            event.stopPropagation();
            renamingFile = filename;
            renderFilesList();
            setTimeout(() => {
                const input = document.querySelector('.file-input');
                if (input) {
                    input.value = filename;
                    input.focus();
                    input.select();
                }
            }, 50);
        }

        function finishRename(oldFilename) {
            const input = document.querySelector('.file-input');
            const newFilename = input?.value.trim();
            
            if (!newFilename || newFilename === oldFilename) {
                renamingFile = null;
                renderFilesList();
                return;
            }

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'rename_file',
                    old_filename: oldFilename,
                    new_filename: newFilename
                }));
            }
            
            renamingFile = null;
        }

        function renderFilesList() {
            filesList.innerHTML = '';
            localFiles.forEach(file => {
                const item = document.createElement('div');
                item.className = `file-item ${file === currentFile ? 'active' : ''} ${renamingFile === file ? 'renaming' : ''}`;
                
                if (renamingFile === file) {
                    item.innerHTML = `
                        <input type="text" class="file-input" onkeypress="if(event.key==='Enter') finishRename('${file}'); else if(event.key==='Escape') {renamingFile=null; renderFilesList();}" onblur="finishRename('${file}')">
                    `;
                } else {
                    item.innerHTML = `
                        <div class="file-name" ondblclick="startRename('${file}', event)">${file}</div>
                        <div class="file-actions">
                            <button class="file-action-btn" onclick="cloneFile('${file}')" title="Clonar">📋</button>
                            <button class="file-action-btn" onclick="startRename('${file}', event)" title="Renomear">✏️</button>
                            <button class="file-action-btn delete" onclick="deleteFile('${file}')" title="Deletar">🗑️</button>
                        </div>
                    `;
                }
                
                item.onclick = (e) => {
                    if (!e.target.classList.contains('file-action-btn') && !e.target.classList.contains('file-input')) {
                        selectFile(file);
                    }
                };
                
                filesList.appendChild(item);
            });
        }

        function updateStatus(message) {
            statusMessage.textContent = message;
            setTimeout(() => {
                if (statusMessage.textContent === message) {
                    statusMessage.textContent = 'Conectado ✓';
                }
            }, 4000);
        }

        editor.addEventListener('input', function() {
            if (!isUpdatingFromServer && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'text_update',
                    filename: currentFile,
                    content: editor.value
                }));
            }
        });

        document.getElementById('landing-nickname').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enterEditor();
            }
        });

        // Focus inicial
        document.getElementById('landing-nickname').focus();
    </script>
</body>
</html>
