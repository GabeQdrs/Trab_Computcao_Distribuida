<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocShare - Compartilhamento de Documentos em Tempo Real</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Landing Page -->
    <div id="landing-page">
        <div class="landing-content">
            <div class="logo">📝</div>
            <h1>DocShare</h1>
            <div class="nickname-form">
                <input type="text" id="landing-nickname" placeholder="Digite seu apelido..." maxlength="20">
                <input type="number" id="ws-port" placeholder="Porta WebSocket (8080)" value="8080">
                <button class="btn-primary" onclick="enterEditor()">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Editor -->
    <div id="main-container">
        <header>
            <div class="header-content">
                <h1>📝 DocShare</h1>
                <div class="header-info">
                    <div class="info-badge">👤 <span id="my-nickname"></span></div>
                    <div class="info-badge">👥 <span id="clients-count">1</span></div>
                    <div class="info-badge">🔌 <span id="current-port-display"></span></div>
                </div>
            </div>
        </header>

        <div class="content-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>📁 Arquivos</h3>
                    <button class="new-file-btn" onclick="createNewFile()">+</button>
                </div>
                <div class="files-list" id="files-list"></div>
            </div>

            <div class="editor-container">
                <textarea id="editor"></textarea>
            </div>
        </div>

        <footer>
            <div id="status-message">Conectado ✓</div>
        </footer>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
